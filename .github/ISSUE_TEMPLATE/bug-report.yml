name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide numbered steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: affected-screen
    attributes:
      label: Affected Screen/Feature
      description: Which screen or feature is affected?
      options:
        - Home
        - Create Bet
        - Bet Detail
        - Player Management
        - Player Detail
        - Admin Panel
        - Leaderboard
        - History
        - Navigation
        - Other
    validations:
      required: true

  - type: dropdown
    id: build-flavor
    attributes:
      label: Build Flavor
      description: Which build flavor were you using?
      options:
        - dev
        - prod
    validations:
      required: true

  - type: checkboxes
    id: data-integrity-impact
    attributes:
      label: Data Integrity Impact
      description: Does this bug affect data integrity? Check all that apply.
      options:
        - label: Incorrect balance calculation
        - label: Transaction not atomic (partial state change)
        - label: PIN-related issue
        - label: Currency rounding error
        - label: Bet state inconsistency

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs about the bug.
      placeholder: Any additional information that might help diagnose the issue.
    validations:
      required: false
